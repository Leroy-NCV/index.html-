<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motorvoorraad — Basis ERP</title>
<style>
  :root{
    --paper:#EDEAE2;
    --panel:#F7F5F0;
    --graphite:#2B2F36;
    --steel:#435363;
    --steel-dark:#323E4A;
    --amber:#C77728;
    --amber-dark:#A8611E;
    --green:#4F7C5B;
    --rust:#B5482E;
    --line:#D9D4C8;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *{box-sizing:border-box;}
  .app{
    font-family:'Inter', sans-serif;
    background:var(--paper);
    color:var(--graphite);
    min-height:100%;
    display:flex;
    border-radius:12px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .sidebar{
    width:180px;
    flex-shrink:0;
    background:var(--steel-dark);
    color:#EDEAE2;
    padding:20px 0;
    display:flex;
    flex-direction:column;
  }
  .brand{
    padding:0 18px 18px 18px;
    border-bottom:1px solid rgba(255,255,255,0.12);
    margin-bottom:10px;
  }
  .brand-tag{
    font-family:'Oswald',sans-serif;
    font-size:10px;
    letter-spacing:2px;
    color:var(--amber);
    text-transform:uppercase;
    font-weight:600;
  }
  .brand-title{
    font-family:'Oswald',sans-serif;
    font-size:19px;
    font-weight:700;
    letter-spacing:0.5px;
    margin-top:2px;
  }
  .nav-btn{
    all:unset;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 18px;
    font-size:13.5px;
    font-weight:500;
    color:#C7CDD3;
    border-left:3px solid transparent;
  }
  .nav-btn:hover{ background:rgba(255,255,255,0.06); color:#fff; }
  .nav-btn.active{
    background:rgba(199,119,40,0.14);
    color:#fff;
    border-left:3px solid var(--amber);
  }
  .nav-btn:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:1px;
  }
  .main{
    flex:1;
    padding:26px 30px;
    overflow-y:auto;
    max-height:100vh;
  }
  h1.page-title{
    font-family:'Oswald',sans-serif;
    font-size:22px;
    font-weight:700;
    margin:0 0 3px 0;
  }
  .page-sub{
    font-size:13px;
    color:#6B7480;
    margin:0 0 20px 0;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
  }
  .grid-cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px;
    margin-bottom:22px;
  }
  .stat-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-left:4px solid var(--steel);
    border-radius:8px;
    padding:12px 14px;
  }
  .stat-card.low{ border-left-color:var(--rust); }
  .stat-motor{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:14px;
    letter-spacing:0.5px;
  }
  .stat-count{
    font-family:'Oswald',sans-serif;
    font-size:26px;
    font-weight:700;
    margin-top:2px;
  }
  .stat-label{ font-size:11px; color:#7A8390; text-transform:uppercase; letter-spacing:0.5px;}
  .badge-low{
    display:inline-block;
    margin-top:6px;
    font-size:10.5px;
    font-weight:600;
    color:var(--rust);
    background:rgba(181,72,46,0.1);
    padding:2px 6px;
    border-radius:4px;
  }
  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center;}
  input[type=text], input[type=number], select, textarea{
    font-family:'Inter',sans-serif;
    font-size:13px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--graphite);
  }
  select{cursor:pointer;}
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    padding:8px 14px;
    border-radius:6px;
    border:none;
    cursor:pointer;
  }
  .btn-primary{ background:var(--amber); color:#fff; }
  .btn-primary:hover{ background:var(--amber-dark); }
  .btn-ghost{ background:transparent; color:var(--steel-dark); border:1px solid var(--line); }
  .btn-ghost:hover{ background:#fff; }
  .btn-danger{ background:transparent; color:var(--rust); border:1px solid rgba(181,72,46,0.35); }
  .btn-danger:hover{ background:rgba(181,72,46,0.08); }
  .btn-sm{ padding:4px 9px; font-size:12px; }

  .form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
    margin-bottom:18px;
  }
  .form-grid label{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
    color:#7A8390;
    display:block;
    margin-bottom:4px;
    font-weight:600;
  }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
    color:#7A8390;
    font-weight:600;
    padding:8px 10px;
    border-bottom:2px solid var(--line);
  }
  tbody td{
    padding:9px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  tbody tr:hover{ background:rgba(67,83,99,0.05); }
  .pill{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    font-weight:500;
    background:rgba(67,83,99,0.1);
    color:var(--steel-dark);
    padding:2px 7px;
    border-radius:5px;
  }
  .cond-pill{ padding:2px 7px; border-radius:5px; font-size:11.5px; font-weight:500;}
  .cond-good{ background:rgba(79,124,91,0.13); color:var(--green); }
  .cond-mid{ background:rgba(199,119,40,0.13); color:var(--amber-dark); }
  .cond-na{ background:rgba(122,131,144,0.13); color:#7A8390; }
  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:#8A93A0;
  }
  .empty-state .em-title{
    font-family:'Oswald',sans-serif;
    font-size:16px;
    color:var(--graphite);
    margin-bottom:4px;
    font-weight:600;
  }
  .settings-block{ margin-bottom:24px; }
  .settings-block h3{
    font-family:'Oswald',sans-serif;
    font-size:14px;
    margin-bottom:10px;
  }
  .chip-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    display:flex; align-items:center; gap:6px;
    background:#fff; border:1px solid var(--line);
    padding:5px 6px 5px 10px; border-radius:16px;
    font-family:'JetBrains Mono',monospace; font-size:12px;
  }
  .chip button{
    all:unset; cursor:pointer; color:var(--rust); font-weight:700;
    width:16px; height:16px; display:flex; align-items:center; justify-content:center;
    border-radius:50%;
  }
  .chip button:hover{ background:rgba(181,72,46,0.12); }
  .add-inline{ display:flex; gap:8px; margin-top:10px; }
  .toast{
    position:fixed; bottom:20px; right:20px;
    background:var(--graphite); color:#fff;
    padding:10px 16px; border-radius:8px; font-size:13px;
    box-shadow:0 4px 14px rgba(0,0,0,0.2);
    opacity:0; transform:translateY(8px);
    transition:all 0.25s ease;
    pointer-events:none;
    z-index:50;
  }
  .toast.show{ opacity:1; transform:translateY(0); }
  .loading{ padding:40px; text-align:center; color:#8A93A0; font-size:13px; }
  .edit-row input, .edit-row select{ width:100%; }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  @media (max-width:720px){
    .app{ flex-direction:column; }
    .sidebar{ width:100%; flex-direction:row; padding:10px; overflow-x:auto; }
    .brand{ display:none; }
    .form-grid{ grid-template-columns:1fr 1fr; }
  }
</style>

</head>

<div id="root" style="max-width:1200px; margin:0 auto; padding:16px; min-height:100vh;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="text/babel">
const {useState, useEffect, useCallback} = React;

const DEFAULT_SETTINGS = {
  motortypes: ["S165","N165","EY17","S185","N18","EY18","M200","N21","M220","EY22","T220","T240","T260","N260","EY26","N280","N330","EY33"],
  condities: ["N/A","Niet gereconditioneerd","Deels gereconditioneerd","Gereconditioneerd"],
  turbotypes: [],
  lowStockThreshold: 5
};

const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

function uid(){ return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function condClass(c){
  if(c === "Gereconditioneerd") return "cond-good";
  if(c === "Deels gereconditioneerd") return "cond-mid";
  return "cond-na";
}

function Toast({msg, action}){
  return (
    <div className={"toast" + (msg ? " show" : "")} style={{display:'flex', alignItems:'center', gap:12, pointerEvents: action ? 'auto' : 'none'}}>
      <span>{msg}</span>
      {action && <button onClick={action.onClick} style={{all:'unset', cursor:'pointer', color:'#F0C48A', fontWeight:700, fontSize:12, textDecoration:'underline', pointerEvents:'auto'}}>{action.label}</button>}
    </div>
  );
}

function App(){
  const [loading, setLoading] = useState(true);
  const [parts, setParts] = useState([]);
  const [turbos, setTurbos] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [tab, setTab] = useState('dashboard');
  const [toast, setToast] = useState('');
  const [filterMotor, setFilterMotor] = useState('');
  const [filterTurbo, setFilterTurbo] = useState('');
  const [searchTurbo, setSearchTurbo] = useState('');
  const [search, setSearch] = useState('');
  const [editId, setEditId] = useState(null);
  const [editDraft, setEditDraft] = useState(null);
  const [mutateItem, setMutateItem] = useState(null);
  const [detailMotor, setDetailMotor] = useState(null);
  const [mutateMode, setMutateMode] = useState('uit');
  const [mutateAmount, setMutateAmount] = useState(1);
  const [mutateNote, setMutateNote] = useState('');
  const [mutateDestination, setMutateDestination] = useState('');
  const [editTurboId, setEditTurboId] = useState(null);
  const [editTurboDraft, setEditTurboDraft] = useState(null);

  const [form, setForm] = useState({motortype:'', locatie:'', omschrijving:'', aantal:'', conditie:'N/A', opmerking:''});
  const [turboForm, setTurboForm] = useState({turbotype:'', locatie:'', omschrijving:'', aantal:'', conditie:'N/A', opmerking:''});
  const [importing, setImporting] = useState(false);
  const [importSummary, setImportSummary] = useState(null);
  const [newMotortype, setNewMotortype] = useState('');
  const [newConditie, setNewConditie] = useState('');
  const [newTurbotype, setNewTurbotype] = useState('');
  const [thresholdDraft, setThresholdDraft] = useState(DEFAULT_SETTINGS.lowStockThreshold);

  const [gebruiker, setGebruiker] = useState(() => localStorage.getItem('voorraad_gebruikersnaam') || '');
  const [naamInvoer, setNaamInvoer] = useState('');
  const [history, setHistory] = useState([]);
  const [uitgaven, setUitgaven] = useState([]);
  const [uitgaveFilterMotor, setUitgaveFilterMotor] = useState('');
  const [uitgaveFilterGebruiker, setUitgaveFilterGebruiker] = useState('');
  const [uitgaveFilterVan, setUitgaveFilterVan] = useState('');
  const [uitgaveFilterTot, setUitgaveFilterTot] = useState('');
  const [uitgaveSearch, setUitgaveSearch] = useState('');
  const [toastAction, setToastAction] = useState(null);
  const [sortField, setSortField] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [sortFieldTurbo, setSortFieldTurbo] = useState(null);
  const [sortDirTurbo, setSortDirTurbo] = useState('asc');

  const showToast = (msg, action) => {
    setToast(msg);
    setToastAction(action || null);
    setTimeout(()=>{ setToast(''); setToastAction(null); }, action ? 15000 : 2200);
  };

  const saveNaam = () => {
    const v = naamInvoer.trim();
    if(!v) return;
    localStorage.setItem('voorraad_gebruikersnaam', v);
    setGebruiker(v);
  };

  const logHistory = async (entity, action, record_id, snapshot) => {
    const entry = { id: uid(), entity, action, record_id, snapshot, gebruiker: gebruiker || 'Onbekend', created_at: new Date().toISOString() };
    try{ await supabase.from('history').insert(entry); }catch(e){ /* geschiedenis loggen mag falen zonder de actie te blokkeren */ }
    setHistory(h => [entry, ...h]);
  };

  const loadAll = useCallback(async () => {
    const { data: partsData, error: partsErr } = await supabase.from('parts').select('*').order('updated_at', { ascending: false });
    if(!partsErr && partsData){
      setParts(partsData.map(p => ({
        id: p.id, motortype: p.motortype, locatie: p.locatie, omschrijving: p.omschrijving,
        aantal: p.aantal, conditie: p.conditie, opmerking: p.opmerking || '', updatedAt: p.updated_at
      })));
    }
    const { data: turbosData, error: turbosErr } = await supabase.from('turbos').select('*').order('updated_at', { ascending: false });
    if(!turbosErr && turbosData){
      setTurbos(turbosData.map(t => ({
        id: t.id, turbotype: t.turbotype, locatie: t.locatie, omschrijving: t.omschrijving,
        aantal: t.aantal, conditie: t.conditie, opmerking: t.opmerking || '', updatedAt: t.updated_at
      })));
    }
    const HISTORY_ACTIONS = ['toegevoegd','gewijzigd','verwijderd','hersteld'];
    const UITGAVE_ACTIONS = ['uitgegeven','aangevuld'];

    const { data: historyData, error: historyErr } = await supabase.from('history').select('*').in('action', HISTORY_ACTIONS).order('created_at', { ascending: false }).limit(500);
    if(!historyErr && historyData){
      setHistory(historyData);
    }

    const { data: uitgavenData, error: uitgavenErr } = await supabase.from('history').select('*').in('action', UITGAVE_ACTIONS).order('created_at', { ascending: false }).limit(5000);
    if(!uitgavenErr && uitgavenData){
      setUitgaven(uitgavenData);
    }

    // Geschiedenis (niet: uitgaven) ouder dan 60 dagen permanent opruimen
    const cutoff = new Date(Date.now() - 60*24*60*60*1000).toISOString();
    supabase.from('history').delete().in('action', HISTORY_ACTIONS).lt('created_at', cutoff).then(()=>{});

    const { data: settingsData, error: settingsErr } = await supabase.from('settings').select('*').eq('id', 1).single();
    if(!settingsErr && settingsData){
      const parsed = {
        motortypes: settingsData.motortypes,
        condities: settingsData.condities,
        turbotypes: settingsData.turbotypes || [],
        lowStockThreshold: settingsData.low_stock_threshold
      };
      setSettings(parsed);
      setThresholdDraft(parsed.lowStockThreshold ?? 5);
    }
  }, []);

  useEffect(() => {
    (async () => {
      try{
        await loadAll();
      }catch(e){
        showToast('Kon geen verbinding maken met de database — check je Supabase-gegevens');
      }
      setLoading(false);
    })();
  }, [loadAll]);

  const persistParts = useCallback(async (next) => {
    setParts(next);
  }, []);

  const persistTurbos = useCallback(async (next) => {
    setTurbos(next);
  }, []);

  const persistSettings = useCallback(async (next) => {
    setSettings(next);
    try{
      await supabase.from('settings').update({
        motortypes: next.motortypes,
        condities: next.condities,
        turbotypes: next.turbotypes,
        low_stock_threshold: next.lowStockThreshold
      }).eq('id', 1);
    }catch(e){
      showToast('Instellingen opslaan mislukt');
    }
  }, []);

  const handleImportFile = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    setImporting(true);
    setImportSummary(null);
    try{
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const sheetName = wb.SheetNames.find(n => n.toLowerCase() === 'invoer') || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});

      const norm = (s) => String(s).trim().toLowerCase();
      const pick = (row, ...names) => {
        const keys = Object.keys(row);
        for(const name of names){
          const key = keys.find(k => norm(k) === norm(name));
          if(key !== undefined) return row[key];
        }
        return '';
      };

      const entries = [];
      for(const row of rows){
        const motortype = String(pick(row, 'Motortype', 'motor type')).trim();
        const locatie = String(pick(row, 'Locatie')).trim();
        const omschrijving = String(pick(row, 'Omschrijving')).trim();
        const aantalRaw = pick(row, 'Aantal');
        const conditie = String(pick(row, 'Conditie')).trim() || 'N/A';
        const opmerking = String(pick(row, 'Opmerking')).trim();
        if(!motortype && !omschrijving) continue; // sla lege regels over
        entries.push({
          id: uid(),
          motortype, locatie, omschrijving,
          aantal: Number(aantalRaw) || 0,
          conditie,
          opmerking,
          updated_at: new Date().toISOString()
        });
      }

      if(entries.length === 0){
        showToast('Geen bruikbare rijen gevonden in dit bestand');
        setImporting(false);
        e.target.value = '';
        return;
      }

      const CHUNK = 200;
      let inserted = 0;
      for(let i = 0; i < entries.length; i += CHUNK){
        const batch = entries.slice(i, i + CHUNK);
        const { error } = await supabase.from('parts').insert(batch);
        if(error){
          showToast('Importeren gestopt bij fout: ' + error.message);
          break;
        }
        inserted += batch.length;
      }

      await loadAll();
      setImportSummary({ total: rows.length, inserted, sheet: sheetName });
      showToast(inserted + ' onderdelen geïmporteerd');
    }catch(err){
      showToast('Kon bestand niet lezen: ' + err.message);
    }
    setImporting(false);
    e.target.value = '';
  };

  const addPart = async (e) => {
    e.preventDefault();
    if(!form.motortype || !form.locatie || !form.omschrijving || form.aantal === ''){
      showToast('Vul motortype, locatie, omschrijving en aantal in');
      return;
    }
    const entry = {
      id: uid(),
      motortype: form.motortype,
      locatie: form.locatie.trim(),
      omschrijving: form.omschrijving.trim(),
      aantal: Number(form.aantal),
      conditie: form.conditie,
      opmerking: form.opmerking.trim(),
      updated_at: new Date().toISOString()
    };
    const { error } = await supabase.from('parts').insert(entry);
    if(error){ showToast('Opslaan mislukt: ' + error.message); return; }
    await persistParts([{...entry, updatedAt: entry.updated_at}, ...parts]);
    logHistory('parts', 'toegevoegd', entry.id, entry);
    setForm({motortype: form.motortype, locatie:'', omschrijving:'', aantal:'', conditie:'N/A', opmerking:''});
    showToast('Onderdeel toegevoegd');
  };

  const restorePart = async (snapshot) => {
    const entry = {
      id: snapshot.id, motortype: snapshot.motortype, locatie: snapshot.locatie,
      omschrijving: snapshot.omschrijving, aantal: snapshot.aantal, conditie: snapshot.conditie,
      opmerking: snapshot.opmerking || '', updated_at: new Date().toISOString()
    };
    const { error } = await supabase.from('parts').insert(entry);
    if(error){ showToast('Herstellen mislukt: ' + error.message); return; }
    await persistParts([{...entry, updatedAt: entry.updated_at}, ...parts.filter(p => p.id !== entry.id)]);
    logHistory('parts', 'hersteld', entry.id, entry);
    showToast('Onderdeel hersteld');
  };

  const deletePart = async (id) => {
    const item = parts.find(p => p.id === id);
    const { error } = await supabase.from('parts').delete().eq('id', id);
    if(error){ showToast('Verwijderen mislukt: ' + error.message); return; }
    await persistParts(parts.filter(p => p.id !== id));
    if(item) logHistory('parts', 'verwijderd', id, item);
    showToast('Onderdeel verwijderd', item ? {label:'Ongedaan maken', onClick: () => restorePart(item)} : null);
  };

  const startEdit = (p) => {
    setEditId(p.id);
    setEditDraft({...p});
  };

  const saveEdit = async () => {
    const before = parts.find(p => p.id === editId);
    const updated = {...editDraft, aantal: Number(editDraft.aantal), updatedAt: new Date().toISOString()};
    const { error } = await supabase.from('parts').update({
      motortype: updated.motortype, locatie: updated.locatie, omschrijving: updated.omschrijving,
      aantal: updated.aantal, conditie: updated.conditie, opmerking: updated.opmerking,
      updated_at: updated.updatedAt
    }).eq('id', editId);
    if(error){ showToast('Bijwerken mislukt: ' + error.message); return; }
    const next = parts.map(p => p.id === editId ? updated : p);
    await persistParts(next);
    logHistory('parts', 'gewijzigd', editId, {voor: before, na: updated});
    setEditId(null);
    setEditDraft(null);
    showToast('Wijziging opgeslagen');
  };

  const cancelEdit = () => { setEditId(null); setEditDraft(null); };

  const openMutate = (item, mode) => {
    setMutateItem(item);
    setMutateMode(mode);
    setMutateAmount(1);
    setMutateNote('');
    setMutateDestination('');
  };

  const cancelMutate = () => { setMutateItem(null); setMutateNote(''); setMutateDestination(''); };

  const confirmMutate = async () => {
    const amount = Number(mutateAmount);
    if(!amount || amount <= 0){ showToast('Vul een aantal groter dan 0 in'); return; }
    const item = mutateItem;
    const delta = mutateMode === 'uit' ? -amount : amount;
    const nieuwAantal = Math.max(0, item.aantal + delta);
    const { error } = await supabase.from('parts').update({ aantal: nieuwAantal, updated_at: new Date().toISOString() }).eq('id', item.id);
    if(error){ showToast('Muteren mislukt: ' + error.message); return; }
    const next = parts.map(p => p.id === item.id ? {...p, aantal: nieuwAantal, updatedAt: new Date().toISOString()} : p);
    await persistParts(next);
    logHistory('parts', mutateMode === 'uit' ? 'uitgegeven' : 'aangevuld', item.id, {
      motortype: item.motortype, locatie: item.locatie, omschrijving: item.omschrijving,
      aantal: amount, van: item.aantal, naar: nieuwAantal, opmerking: mutateNote.trim(), bestemming: mutateDestination.trim()
    });
    showToast(mutateMode === 'uit' ? `${amount} stuks uitgegeven` : `${amount} stuks aangevuld`);
    setMutateItem(null);
    setMutateNote('');
    setMutateDestination('');
  };

  const addTurbo = async (e) => {
    e.preventDefault();
    if(!turboForm.turbotype || !turboForm.locatie || !turboForm.omschrijving || turboForm.aantal === ''){
      showToast('Vul turbotype, locatie, omschrijving en aantal in');
      return;
    }
    const entry = {
      id: uid(),
      turbotype: turboForm.turbotype,
      locatie: turboForm.locatie.trim(),
      omschrijving: turboForm.omschrijving.trim(),
      aantal: Number(turboForm.aantal),
      conditie: turboForm.conditie,
      opmerking: turboForm.opmerking.trim(),
      updated_at: new Date().toISOString()
    };
    const { error } = await supabase.from('turbos').insert(entry);
    if(error){ showToast('Opslaan mislukt: ' + error.message); return; }
    await persistTurbos([{...entry, updatedAt: entry.updated_at}, ...turbos]);
    logHistory('turbos', 'toegevoegd', entry.id, entry);
    setTurboForm({turbotype: turboForm.turbotype, locatie:'', omschrijving:'', aantal:'', conditie:'N/A', opmerking:''});
    showToast('Turbo toegevoegd');
  };

  const restoreTurbo = async (snapshot) => {
    const entry = {
      id: snapshot.id, turbotype: snapshot.turbotype, locatie: snapshot.locatie,
      omschrijving: snapshot.omschrijving, aantal: snapshot.aantal, conditie: snapshot.conditie,
      opmerking: snapshot.opmerking || '', updated_at: new Date().toISOString()
    };
    const { error } = await supabase.from('turbos').insert(entry);
    if(error){ showToast('Herstellen mislukt: ' + error.message); return; }
    await persistTurbos([{...entry, updatedAt: entry.updated_at}, ...turbos.filter(t => t.id !== entry.id)]);
    logHistory('turbos', 'hersteld', entry.id, entry);
    showToast('Turbo hersteld');
  };

  const deleteTurbo = async (id) => {
    const item = turbos.find(t => t.id === id);
    const { error } = await supabase.from('turbos').delete().eq('id', id);
    if(error){ showToast('Verwijderen mislukt: ' + error.message); return; }
    await persistTurbos(turbos.filter(t => t.id !== id));
    if(item) logHistory('turbos', 'verwijderd', id, item);
    showToast('Turbo verwijderd', item ? {label:'Ongedaan maken', onClick: () => restoreTurbo(item)} : null);
  };

  const startEditTurbo = (t) => {
    setEditTurboId(t.id);
    setEditTurboDraft({...t});
  };

  const saveEditTurbo = async () => {
    const before = turbos.find(t => t.id === editTurboId);
    const updated = {...editTurboDraft, aantal: Number(editTurboDraft.aantal), updatedAt: new Date().toISOString()};
    const { error } = await supabase.from('turbos').update({
      turbotype: updated.turbotype, locatie: updated.locatie, omschrijving: updated.omschrijving,
      aantal: updated.aantal, conditie: updated.conditie, opmerking: updated.opmerking,
      updated_at: updated.updatedAt
    }).eq('id', editTurboId);
    if(error){ showToast('Bijwerken mislukt: ' + error.message); return; }
    const next = turbos.map(t => t.id === editTurboId ? updated : t);
    await persistTurbos(next);
    logHistory('turbos', 'gewijzigd', editTurboId, {voor: before, na: updated});
    setEditTurboId(null);
    setEditTurboDraft(null);
    showToast('Wijziging opgeslagen');
  };

  const cancelEditTurbo = () => { setEditTurboId(null); setEditTurboDraft(null); };

  const addTurbotype = async () => {
    const v = newTurbotype.trim();
    if(!v || settings.turbotypes.includes(v)) return;
    const next = {...settings, turbotypes:[...settings.turbotypes, v]};
    await persistSettings(next);
    setNewTurbotype('');
  };

  const removeTurbotype = async (v) => {
    const next = {...settings, turbotypes: settings.turbotypes.filter(t => t !== v)};
    await persistSettings(next);
  };

  const addMotortype = async () => {
    const v = newMotortype.trim();
    if(!v || settings.motortypes.includes(v)) return;
    const next = {...settings, motortypes:[...settings.motortypes, v]};
    await persistSettings(next);
    setNewMotortype('');
  };

  const removeMotortype = async (v) => {
    const next = {...settings, motortypes: settings.motortypes.filter(m => m !== v)};
    await persistSettings(next);
  };

  const addConditie = async () => {
    const v = newConditie.trim();
    if(!v || settings.condities.includes(v)) return;
    const next = {...settings, condities:[...settings.condities, v]};
    await persistSettings(next);
    setNewConditie('');
  };

  const removeConditie = async (v) => {
    const next = {...settings, condities: settings.condities.filter(c => c !== v)};
    await persistSettings(next);
  };

  const saveThreshold = async () => {
    const next = {...settings, lowStockThreshold: Number(thresholdDraft) || 0};
    await persistSettings(next);
    showToast('Drempel opgeslagen');
  };

  if(loading){
    return <div className="app"><div className="main"><div className="loading">Voorraad wordt geladen…</div></div></div>;
  }

  if(!gebruiker){
    return (
      <div className="app" style={{alignItems:'center', justifyContent:'center', minHeight:400}}>
        <div className="card" style={{maxWidth:340, textAlign:'center'}}>
          <div style={{fontFamily:'Oswald,sans-serif', fontWeight:700, fontSize:18, marginBottom:6}}>Welkom</div>
          <p style={{fontSize:13, color:'#7A8390', marginBottom:14}}>Vul je naam in zodat wijzigingen aan je toegeschreven kunnen worden in de geschiedenis.</p>
          <input type="text" placeholder="Jouw naam" value={naamInvoer} onChange={e=>setNaamInvoer(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') saveNaam();}} style={{width:'100%', marginBottom:10}} />
          <button className="btn btn-primary" style={{width:'100%'}} onClick={saveNaam}>Doorgaan</button>
        </div>
      </div>
    );
  }

  const sortRows = (rows, field, dir) => {
    if(!field) return rows;
    const sorted = [...rows].sort((a,b) => {
      let av = a[field], bv = b[field];
      if(typeof av === 'string') av = av.toLowerCase();
      if(typeof bv === 'string') bv = bv.toLowerCase();
      if(av < bv) return -1;
      if(av > bv) return 1;
      return 0;
    });
    return dir === 'desc' ? sorted.reverse() : sorted;
  };

  const toggleSort = (field) => {
    if(sortField === field){ setSortDir(sortDir === 'asc' ? 'desc' : 'asc'); }
    else { setSortField(field); setSortDir('asc'); }
  };

  const toggleSortTurbo = (field) => {
    if(sortFieldTurbo === field){ setSortDirTurbo(sortDirTurbo === 'asc' ? 'desc' : 'asc'); }
    else { setSortFieldTurbo(field); setSortDirTurbo('asc'); }
  };

  const sortArrow = (field, curField, curDir) => curField === field ? (curDir === 'asc' ? ' ▲' : ' ▼') : '';

  const exportToExcel = (rows, typeLabel, typeField) => {
    if(rows.length === 0){ showToast('Niets om te exporteren'); return; }
    const data = rows.map(r => ({
      [typeLabel]: r[typeField], Locatie: r.locatie, Omschrijving: r.omschrijving,
      Aantal: r.aantal, Conditie: r.conditie, Opmerking: r.opmerking || ''
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wbook, ws, 'Voorraad');
    const datum = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wbook, `voorraad-${typeField}-${datum}.xlsx`);
    showToast('Excel-bestand gedownload');
  };

  const filtered = sortRows(parts.filter(p => {
    const matchMotor = !filterMotor || p.motortype === filterMotor;
    const q = search.trim().toLowerCase();
    const matchSearch = !q || p.omschrijving.toLowerCase().includes(q) || p.locatie.toLowerCase().includes(q) || p.motortype.toLowerCase().includes(q);
    return matchMotor && matchSearch;
  }), sortField, sortDir);

  const filteredTurbos = sortRows(turbos.filter(t => {
    const matchTurbo = !filterTurbo || t.turbotype === filterTurbo;
    const q = searchTurbo.trim().toLowerCase();
    const matchSearch = !q || t.omschrijving.toLowerCase().includes(q) || t.locatie.toLowerCase().includes(q) || t.turbotype.toLowerCase().includes(q);
    return matchTurbo && matchSearch;
  }), sortFieldTurbo, sortDirTurbo);

  const byMotor = {};
  parts.forEach(p => {
    byMotor[p.motortype] = byMotor[p.motortype] || {count:0, total:0, low:false};
    byMotor[p.motortype].count += 1;
    byMotor[p.motortype].total += p.aantal;
    if(p.aantal < settings.lowStockThreshold) byMotor[p.motortype].low = true;
  });

  const totalParts = parts.length;
  const totalUnits = parts.reduce((a,p)=>a+p.aantal,0);
  const lowStockRows = parts.filter(p => p.aantal < settings.lowStockThreshold);
  const totalTurbos = turbos.length;
  const totalTurboUnits = turbos.reduce((a,t)=>a+t.aantal,0);
  const lowStockTurboRows = turbos.filter(t => t.aantal < settings.lowStockThreshold);

  return (
    <div className="app">
      <div className="sidebar">
        <div className="brand">
          <div className="brand-tag">Basis ERP</div>
          <div className="brand-title">Motorvoorraad</div>
        </div>
        <button className={"nav-btn" + (tab==='dashboard'?' active':'')} onClick={()=>setTab('dashboard')}>Dashboard</button>
        <button className={"nav-btn" + (tab==='voorraad'?' active':'')} onClick={()=>setTab('voorraad')}>Voorraad invoer</button>
        <button className={"nav-btn" + (tab==='geschiedenis'?' active':'')} onClick={()=>setTab('geschiedenis')}>Geschiedenis</button>
        <button className={"nav-btn" + (tab==='uitgaven'?' active':'')} onClick={()=>setTab('uitgaven')}>Uitgaven</button>
        <button className={"nav-btn" + (tab==='instellingen'?' active':'')} onClick={()=>setTab('instellingen')}>Instellingen</button>
        <div style={{marginTop:'auto', paddingTop:14, borderTop:'1px solid rgba(255,255,255,0.12)'}}>
          <button className="nav-btn" onClick={async ()=>{ await loadAll(); showToast('Bijgewerkt'); }}>↻ Vernieuwen</button>
        </div>
      </div>

      <div className="main">
        {tab === 'dashboard' && (
          <div>
            <h1 className="page-title">Dashboard</h1>
            <p className="page-sub">{totalParts} onderdelen · {totalUnits} stuks totaal · {settings.motortypes.length} motortypes</p>

            {lowStockRows.length > 0 && (
              <div className="card" style={{borderLeft:'4px solid var(--rust)', marginBottom:20}}>
                <strong style={{color:'var(--rust)'}}>Lage voorraad</strong>
                <span style={{fontSize:12, color:'#7A8390'}}> — onder de {settings.lowStockThreshold} stuks</span>
                <table style={{marginTop:10}}>
                  <thead><tr><th>Motortype</th><th>Locatie</th><th>Omschrijving</th><th>Aantal</th></tr></thead>
                  <tbody>
                    {lowStockRows.map(p => (
                      <tr key={p.id}>
                        <td><span className="pill">{p.motortype}</span></td>
                        <td>{p.locatie}</td>
                        <td>{p.omschrijving}</td>
                        <td style={{color:'var(--rust)', fontWeight:600}}>{p.aantal}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            <div className="grid-cards">
              {settings.motortypes.map(mt => {
                const d = byMotor[mt] || {count:0,total:0,low:false};
                return (
                  <div key={mt} className={"stat-card" + (d.low?" low":"")} onClick={()=>setDetailMotor(mt)} style={{cursor:'pointer'}}>
                    <div className="stat-motor">{mt}</div>
                    <div className="stat-count">{d.total}</div>
                    <div className="stat-label">{d.count} regel{d.count===1?'':'s'}</div>
                    {d.low && <div className="badge-low">Lage voorraad</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab === 'voorraad' && (
          <div>
            <h1 className="page-title">Voorraad invoer</h1>
            <p className="page-sub">Nieuw onderdeel toevoegen en bestaande voorraad beheren</p>

            <div className="card" style={{marginBottom:20, borderLeft:'4px solid var(--steel)'}}>
              <strong>Excel importeren</strong>
              <p style={{fontSize:12, color:'#7A8390', margin:'4px 0 10px 0'}}>
                Upload een .xlsx bestand met kolommen Motortype, Locatie, Omschrijving, Aantal, Conditie, Opmerking (zoals het "Invoer"-tabblad). Rijen worden toegevoegd aan de bestaande voorraad, niet overschreven.
              </p>
              <div className="add-inline">
                <input type="file" accept=".xlsx,.xls" onChange={handleImportFile} disabled={importing} />
                {importing && <span style={{fontSize:12, color:'#7A8390'}}>Bezig met importeren…</span>}
              </div>
              {importSummary && (
                <div style={{fontSize:12, color:'var(--green)', marginTop:8}}>
                  {importSummary.inserted} van {importSummary.total} rijen geïmporteerd uit tabblad "{importSummary.sheet}".
                </div>
              )}
            </div>

            <form onSubmit={addPart} className="card" style={{marginBottom:20}}>
              <div className="form-grid">
                <div>
                  <label>Motortype</label>
                  <select value={form.motortype} onChange={e=>setForm({...form, motortype:e.target.value})} style={{width:'100%'}}>
                    <option value="">Kies...</option>
                    {settings.motortypes.map(mt => <option key={mt} value={mt}>{mt}</option>)}
                  </select>
                </div>
                <div>
                  <label>Locatie</label>
                  <input type="text" value={form.locatie} onChange={e=>setForm({...form, locatie:e.target.value})} style={{width:'100%'}} placeholder="bv. A-12-3" />
                </div>
                <div style={{gridColumn:'span 2'}}>
                  <label>Omschrijving</label>
                  <input type="text" value={form.omschrijving} onChange={e=>setForm({...form, omschrijving:e.target.value})} style={{width:'100%'}} placeholder="bv. Krukas" />
                </div>
                <div>
                  <label>Aantal</label>
                  <input type="number" min="0" value={form.aantal} onChange={e=>setForm({...form, aantal:e.target.value})} style={{width:'100%'}} />
                </div>
                <div>
                  <label>Conditie</label>
                  <select value={form.conditie} onChange={e=>setForm({...form, conditie:e.target.value})} style={{width:'100%'}}>
                    {settings.condities.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div style={{gridColumn:'span 5'}}>
                  <label>Opmerking</label>
                  <input type="text" value={form.opmerking} onChange={e=>setForm({...form, opmerking:e.target.value})} style={{width:'100%'}} placeholder="optioneel" />
                </div>
                <div style={{display:'flex', alignItems:'flex-end'}}>
                  <button className="btn btn-primary" type="submit" style={{width:'100%'}}>Toevoegen</button>
                </div>
              </div>
            </form>

            <div className="toolbar">
              <select value={filterMotor} onChange={e=>setFilterMotor(e.target.value)}>
                <option value="">Alle motortypes</option>
                {settings.motortypes.map(mt => <option key={mt} value={mt}>{mt}</option>)}
              </select>
              <input type="text" placeholder="Zoeken op omschrijving, locatie of type..." value={search} onChange={e=>setSearch(e.target.value)} style={{minWidth:260}} />
              {filterMotor && <button className="btn btn-ghost btn-sm" onClick={()=>setFilterMotor('')}>Filter wissen</button>}
              <button className="btn btn-ghost btn-sm" onClick={()=>exportToExcel(filtered, 'Motortype', 'motortype')}>⬇ Exporteren naar Excel</button>
              <span style={{marginLeft:'auto', fontSize:12, color:'#7A8390'}}>{filtered.length} van {parts.length} regels</span>
            </div>

            <div className="card" style={{padding:0, overflowX:'auto'}}>
              {filtered.length === 0 ? (
                <div className="empty-state">
                  <div className="em-title">Geen onderdelen gevonden</div>
                  <div>Voeg hierboven een onderdeel toe of pas je filter aan.</div>
                </div>
              ) : (
                <table>
                  <thead>
                    <tr>
                      <th>Motortype</th>
                      <th style={{cursor:'pointer'}} onClick={()=>toggleSort('locatie')}>Locatie{sortArrow('locatie', sortField, sortDir)}</th>
                      <th style={{cursor:'pointer'}} onClick={()=>toggleSort('omschrijving')}>Omschrijving{sortArrow('omschrijving', sortField, sortDir)}</th>
                      <th style={{cursor:'pointer'}} onClick={()=>toggleSort('aantal')}>Aantal{sortArrow('aantal', sortField, sortDir)}</th>
                      <th>Conditie</th><th>Opmerking</th><th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(p => editId === p.id ? (
                      <tr key={p.id} className="edit-row">
                        <td>
                          <select value={editDraft.motortype} onChange={e=>setEditDraft({...editDraft, motortype:e.target.value})}>
                            {settings.motortypes.map(mt => <option key={mt} value={mt}>{mt}</option>)}
                          </select>
                        </td>
                        <td><input type="text" value={editDraft.locatie} onChange={e=>setEditDraft({...editDraft, locatie:e.target.value})} /></td>
                        <td><input type="text" value={editDraft.omschrijving} onChange={e=>setEditDraft({...editDraft, omschrijving:e.target.value})} /></td>
                        <td><input type="number" value={editDraft.aantal} onChange={e=>setEditDraft({...editDraft, aantal:e.target.value})} /></td>
                        <td>
                          <select value={editDraft.conditie} onChange={e=>setEditDraft({...editDraft, conditie:e.target.value})}>
                            {settings.condities.map(c => <option key={c} value={c}>{c}</option>)}
                          </select>
                        </td>
                        <td><input type="text" value={editDraft.opmerking} onChange={e=>setEditDraft({...editDraft, opmerking:e.target.value})} /></td>
                        <td style={{whiteSpace:'nowrap'}}>
                          <button className="btn btn-primary btn-sm" onClick={saveEdit} style={{marginRight:6}}>Opslaan</button>
                          <button className="btn btn-ghost btn-sm" onClick={cancelEdit}>Annuleren</button>
                        </td>
                      </tr>
                    ) : (
                      <tr key={p.id}>
                        <td><span className="pill">{p.motortype}</span></td>
                        <td>{p.locatie}</td>
                        <td>{p.omschrijving}</td>
                        <td style={{fontWeight:600, color: p.aantal < settings.lowStockThreshold ? 'var(--rust)' : 'inherit'}}>{p.aantal}</td>
                        <td><span className={"cond-pill " + condClass(p.conditie)}>{p.conditie}</span></td>
                        <td style={{color:'#7A8390'}}>{p.opmerking || '—'}</td>
                        <td style={{whiteSpace:'nowrap'}}>
                          <button className="btn btn-primary btn-sm" onClick={()=>openMutate(p, 'uit')} style={{marginRight:6}}>− Uitgeven</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>openMutate(p, 'aan')} style={{marginRight:6}}>+ Aanvullen</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>startEdit(p)} style={{marginRight:6}}>Bewerken</button>
                          <button className="btn btn-danger btn-sm" onClick={()=>deletePart(p.id)}>Verwijderen</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}

        {tab === 'geschiedenis' && (
          <div>
            <h1 className="page-title">Geschiedenis</h1>
            <p className="page-sub">Toevoegingen, wijzigingen en verwijderingen — laatste 60 dagen, daarna automatisch opgeruimd. Uitgaven/aanvullingen vind je permanent onder "Uitgaven".</p>

            <div className="card" style={{padding:0, overflowX:'auto'}}>
              {history.length === 0 ? (
                <div className="empty-state">
                  <div className="em-title">Nog geen wijzigingen gelogd</div>
                  <div>Zodra iemand iets toevoegt, wijzigt of verwijdert, verschijnt dat hier.</div>
                </div>
              ) : (
                <table>
                  <thead>
                    <tr><th>Wanneer</th><th>Gebruiker</th><th>Actie</th><th>Categorie</th><th>Wat</th><th></th></tr>
                  </thead>
                  <tbody>
                    {history.map(h => {
                      const label = h.entity === 'parts' ? (h.snapshot.motortype || (h.snapshot.na && h.snapshot.na.motortype) || (h.snapshot.voor && h.snapshot.voor.motortype)) : (h.snapshot.turbotype || (h.snapshot.na && h.snapshot.na.turbotype) || (h.snapshot.voor && h.snapshot.voor.turbotype));
                      const omschr = h.action === 'gewijzigd' ? (h.snapshot.na && h.snapshot.na.omschrijving) : h.snapshot.omschrijving;
                      const when = new Date(h.created_at).toLocaleString('nl-NL', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
                      return (
                        <tr key={h.id}>
                          <td style={{whiteSpace:'nowrap', fontSize:12, color:'#7A8390'}}>{when}</td>
                          <td>{h.gebruiker}</td>
                          <td>
                            <span className={"cond-pill " + (h.action === 'verwijderd' ? 'cond-na' : h.action === 'toegevoegd' ? 'cond-good' : 'cond-mid')}>{h.action}</span>
                          </td>
                          <td><span className="pill">{h.entity === 'parts' ? 'Voorraad' : 'Turbo'}</span></td>
                          <td>{label} — {omschr}</td>
                          <td>
                            {h.action === 'verwijderd' && (
                              <button className="btn btn-ghost btn-sm" onClick={()=> h.entity === 'parts' ? restorePart(h.snapshot) : restoreTurbo(h.snapshot)}>Herstellen</button>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}

        {tab === 'uitgaven' && (
          <div>
            <h1 className="page-title">Uitgaven</h1>
            <p className="page-sub">Alle uitgegeven en aangevulde stuks — permanent bewaard, {uitgaven.length} regels</p>

            <div className="toolbar">
              <select value={uitgaveFilterMotor} onChange={e=>setUitgaveFilterMotor(e.target.value)}>
                <option value="">Alle motortypes</option>
                {settings.motortypes.map(mt => <option key={mt} value={mt}>{mt}</option>)}
              </select>
              <select value={uitgaveFilterGebruiker} onChange={e=>setUitgaveFilterGebruiker(e.target.value)}>
                <option value="">Alle gebruikers</option>
                {[...new Set(uitgaven.map(u => u.gebruiker))].sort().map(g => <option key={g} value={g}>{g}</option>)}
              </select>
              <label style={{fontSize:12, color:'#7A8390'}}>Van <input type="date" value={uitgaveFilterVan} onChange={e=>setUitgaveFilterVan(e.target.value)} /></label>
              <label style={{fontSize:12, color:'#7A8390'}}>Tot <input type="date" value={uitgaveFilterTot} onChange={e=>setUitgaveFilterTot(e.target.value)} /></label>
              <input type="text" placeholder="Zoeken op omschrijving of bestemming..." value={uitgaveSearch} onChange={e=>setUitgaveSearch(e.target.value)} style={{minWidth:220}} />
            </div>

            {(() => {
              const filteredUitgaven = uitgaven.filter(u => {
                const motor = u.snapshot.motortype;
                const matchMotor = !uitgaveFilterMotor || motor === uitgaveFilterMotor;
                const matchGebruiker = !uitgaveFilterGebruiker || u.gebruiker === uitgaveFilterGebruiker;
                const d = new Date(u.created_at);
                const matchVan = !uitgaveFilterVan || d >= new Date(uitgaveFilterVan);
                const matchTot = !uitgaveFilterTot || d <= new Date(uitgaveFilterTot + 'T23:59:59');
                const q = uitgaveSearch.trim().toLowerCase();
                const matchSearch = !q || (u.snapshot.omschrijving||'').toLowerCase().includes(q) || (u.snapshot.bestemming||'').toLowerCase().includes(q);
                return matchMotor && matchGebruiker && matchVan && matchTot && matchSearch;
              });
              return (
                <div className="card" style={{padding:0, overflowX:'auto'}}>
                  {filteredUitgaven.length === 0 ? (
                    <div className="empty-state">
                      <div className="em-title">Geen uitgaven gevonden</div>
                      <div>Zodra iemand iets uitgeeft of aanvult via Voorraad invoer, verschijnt dat hier.</div>
                    </div>
                  ) : (
                    <table>
                      <thead>
                        <tr><th>Wanneer</th><th>Gebruiker</th><th>Actie</th><th>Motortype</th><th>Omschrijving</th><th>Aantal</th><th>Van → Naar</th><th>Bestemming</th><th>Reden</th></tr>
                      </thead>
                      <tbody>
                        {filteredUitgaven.map(u => {
                          const when = new Date(u.created_at).toLocaleString('nl-NL', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
                          return (
                            <tr key={u.id}>
                              <td style={{whiteSpace:'nowrap', fontSize:12, color:'#7A8390'}}>{when}</td>
                              <td>{u.gebruiker}</td>
                              <td><span className={"cond-pill " + (u.action === 'uitgegeven' ? 'cond-mid' : 'cond-good')}>{u.action}</span></td>
                              <td><span className="pill">{u.snapshot.motortype}</span></td>
                              <td>{u.snapshot.omschrijving}</td>
                              <td style={{fontWeight:600}}>{u.snapshot.aantal}</td>
                              <td style={{fontSize:12, color:'#7A8390'}}>{u.snapshot.van} → {u.snapshot.naar}</td>
                              <td>{u.snapshot.bestemming || '—'}</td>
                              <td style={{color:'#7A8390'}}>{u.snapshot.opmerking || '—'}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  )}
                </div>
              );
            })()}
          </div>
        )}

        {tab === 'instellingen' && (
          <div>
            <h1 className="page-title">Instellingen</h1>
            <p className="page-sub">Beheer motortypes, conditie-opties en de lage-voorraad drempel</p>

            <div className="card settings-block">
              <h3>Motortypes</h3>
              <div className="chip-list">
                {settings.motortypes.map(mt => (
                  <div className="chip" key={mt}>{mt}<button onClick={()=>removeMotortype(mt)} title="Verwijderen">×</button></div>
                ))}
              </div>
              <div className="add-inline">
                <input type="text" placeholder="Nieuw motortype (bv. T280)" value={newMotortype} onChange={e=>setNewMotortype(e.target.value)} />
                <button className="btn btn-primary btn-sm" onClick={addMotortype}>Toevoegen</button>
              </div>
            </div>

            <div className="card settings-block">
              <h3>Turbotypes</h3>
              <p style={{fontSize:12, color:'#7A8390', marginTop:-4, marginBottom:10}}>Zolang deze lijst leeg is, kun je het turbotype vrij intypen bij het toevoegen van een turbo.</p>
              <div className="chip-list">
                {settings.turbotypes.map(tt => (
                  <div className="chip" key={tt}>{tt}<button onClick={()=>removeTurbotype(tt)} title="Verwijderen">×</button></div>
                ))}
              </div>
              <div className="add-inline">
                <input type="text" placeholder="Nieuw turbotype (bv. TD04)" value={newTurbotype} onChange={e=>setNewTurbotype(e.target.value)} />
                <button className="btn btn-primary btn-sm" onClick={addTurbotype}>Toevoegen</button>
              </div>
            </div>

            <div className="card settings-block">
              <h3>Conditie-opties</h3>
              <div className="chip-list">
                {settings.condities.map(c => (
                  <div className="chip" key={c}>{c}<button onClick={()=>removeConditie(c)} title="Verwijderen">×</button></div>
                ))}
              </div>
              <div className="add-inline">
                <input type="text" placeholder="Nieuwe conditie" value={newConditie} onChange={e=>setNewConditie(e.target.value)} />
                <button className="btn btn-primary btn-sm" onClick={addConditie}>Toevoegen</button>
              </div>
            </div>

            <div className="card settings-block">
              <h3>Lage-voorraad drempel</h3>
              <p style={{fontSize:12, color:'#7A8390', marginTop:-4, marginBottom:10}}>Onderdelen met een aantal onder deze waarde worden gemarkeerd als lage voorraad.</p>
              <div className="add-inline">
                <input type="number" min="0" value={thresholdDraft} onChange={e=>setThresholdDraft(e.target.value)} style={{width:100}} />
                <button className="btn btn-primary btn-sm" onClick={saveThreshold}>Opslaan</button>
              </div>
            </div>
          </div>
        )}
      </div>
      {detailMotor && (
        <div style={{position:'fixed', inset:0, background:'rgba(43,47,54,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:40}} onClick={()=>setDetailMotor(null)}>
          <div className="card" style={{width:520, maxWidth:'90vw', maxHeight:'80vh', overflowY:'auto', background:'#fff'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
              <div style={{fontFamily:'Oswald,sans-serif', fontWeight:700, fontSize:18}}>{detailMotor}</div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setDetailMotor(null)}>Sluiten</button>
            </div>
            {parts.filter(p => p.motortype === detailMotor).length === 0 ? (
              <div className="empty-state" style={{padding:20}}>
                <div className="em-title">Geen onderdelen</div>
                <div>Er staat nog niets geregistreerd voor dit motortype.</div>
              </div>
            ) : (
              <table>
                <thead><tr><th>Locatie</th><th>Omschrijving</th><th>Aantal</th><th>Conditie</th></tr></thead>
                <tbody>
                  {parts.filter(p => p.motortype === detailMotor).map(p => (
                    <tr key={p.id}>
                      <td>{p.locatie}</td>
                      <td>{p.omschrijving}</td>
                      <td style={{fontWeight:600, color: p.aantal < settings.lowStockThreshold ? 'var(--rust)' : 'inherit'}}>{p.aantal}</td>
                      <td><span className={"cond-pill " + condClass(p.conditie)}>{p.conditie}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {mutateItem && (
        <div style={{position:'fixed', inset:0, background:'rgba(43,47,54,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:40}}>
          <div className="card" style={{width:320, background:'#fff'}}>
            <div style={{fontFamily:'Oswald,sans-serif', fontWeight:700, fontSize:16, marginBottom:4}}>
              {mutateMode === 'uit' ? 'Uitgeven' : 'Aanvullen'}
            </div>
            <div style={{fontSize:12, color:'#7A8390', marginBottom:14}}>
              {mutateItem.motortype} — {mutateItem.omschrijving} · huidig aantal: <strong>{mutateItem.aantal}</strong>
            </div>
            <div style={{display:'flex', gap:8, marginBottom:10}}>
              <button className={"btn btn-sm " + (mutateMode==='uit' ? 'btn-primary' : 'btn-ghost')} onClick={()=>setMutateMode('uit')} style={{flex:1}}>− Uitgeven</button>
              <button className={"btn btn-sm " + (mutateMode==='aan' ? 'btn-primary' : 'btn-ghost')} onClick={()=>setMutateMode('aan')} style={{flex:1}}>+ Aanvullen</button>
            </div>
            <label style={{fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.4px', color:'#7A8390', display:'block', marginBottom:4, fontWeight:600}}>Aantal</label>
            <input type="number" min="1" max={mutateMode==='uit' ? mutateItem.aantal : undefined} value={mutateAmount} onChange={e=>setMutateAmount(e.target.value)} style={{width:'100%', marginBottom:10}} autoFocus />
            <label style={{fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.4px', color:'#7A8390', display:'block', marginBottom:4, fontWeight:600}}>Reden / opmerking (optioneel)</label>
            <input type="text" placeholder="bv. gebruikt voor project X" value={mutateNote} onChange={e=>setMutateNote(e.target.value)} style={{width:'100%', marginBottom:10}} />
            {mutateMode === 'uit' && (
              <React.Fragment>
                <label style={{fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.4px', color:'#7A8390', display:'block', marginBottom:4, fontWeight:600}}>Bestemming (waar gaat het naartoe?)</label>
                <input type="text" placeholder="bv. klant Jansen / werkplaats hal 2" value={mutateDestination} onChange={e=>setMutateDestination(e.target.value)} style={{width:'100%', marginBottom:14}} />
              </React.Fragment>
            )}
            {mutateMode === 'uit' && Number(mutateAmount) > mutateItem.aantal && (
              <div style={{fontSize:12, color:'var(--rust)', marginBottom:10}}>Let op: dit is meer dan er in voorraad is, aantal wordt op 0 gezet.</div>
            )}
            <div style={{display:'flex', gap:8}}>
              <button className="btn btn-primary" onClick={confirmMutate} style={{flex:1}}>Bevestigen</button>
              <button className="btn btn-ghost" onClick={cancelMutate} style={{flex:1}}>Annuleren</button>
            </div>
          </div>
        </div>
      )}

      <Toast msg={toast} action={toastAction} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
